# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  jobs:
    - name: prettier
      glob: "*.{js,ts,jsx,tsx,json,css,md}"
      run: bun x prettier --write {staged_files} && git add {staged_files}

    - name: type-check
      run: bun run check-types

pre-push:
  jobs:
    - name: build-check
      run: bun run build
